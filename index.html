padding:0;

body{

background:linear-gradient(135deg,#160021,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

.card{

width:90%;
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border-radius:25px;
padding:35px;
text-align:center;

animation:gel 1s;

}

@keyframes gel{

from{
opacity:0;
transform:translateY(40px);
}

to{

opacity:1;
transform:translateY(0);

}

}

img{

width:170px;
height:170px;
border-radius:50%;
border:5px solid #b700ff;
box-shadow:0 0 25px #d100ff;

}

h1{

margin-top:20px;
font-size:35px;

}

.alt{

color:#cfcfcf;
margin-bottom:25px;

}

.btn{

display:block;
text-decoration:none;
color:white;
padding:15px;
margin-top:15px;
border-radius:15px;
background:#7700ff;
transition:.3s;

}

.btn:hover{

background:#b300ff;
transform:scale(1.04);

}
