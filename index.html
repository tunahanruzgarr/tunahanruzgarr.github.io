<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunahan Aşkın</title>

<link rel="icon" href="profile.jpg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#180022,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

.card{
    width:92%;
    max-width:420px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,.5);
    animation:fade 1s;
}

@keyframes fade{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

img{
    width:180px;
    height:180px;
    border-radius:50%;
    border:5px solid white;
    object-fit:cover;
    margin-bottom:20px;
}

h1{
    font-size:38px;
    margin-bottom:20px;
}

a{
    display:block;
    margin:12px 0;
    padding:14px;
    background:#ffffff15;
    border-radius:12px;
    color:white;
    text-decoration:none;
    font-size:20px;
    transition:.3s;
}

a:hover{
    background:#7a00ff;
}

.footer{
    margin-top:25px;
    font-size:15px;
    opacity:.7;
}

#playButton{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#7a00ff;
    color:#fff;
    border:none;
    padding:14px 28px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 15px rgba(122,0,255,.6);
    z-index:9999;
}

#playButton:hover{
    background:#9b2dff;
}
</style>
</head>

<body>

<div class="card">

<img src="profile.jpg" alt="Profil Fotoğrafı">

<h1>Tunahan Aşkın</h1>

<a href="tel:05368705148">📞 Ara</a>

<div class="footer">
© 2026 Tunahan Aşkın
</div>

</div>

<button id="playButton">🎵 Müziği Başlat</button>

<audio id="bgMusic" loop>
    <source src="Muzik.mp3" type="audio/mpeg">
    Tarayıcınız ses oynatmayı desteklemiyor.
</audio>

<script>
const playButton = document.getElementById("playButton");
const bgMusic = document.getElementById("bgMusic");

bgMusic.volume = 0.4;

playButton.addEventListener("click", function () {
    bgMusic.play().then(() => {
        playButton.style.display = "none";
    }).catch(err => {
        alert("Müzik başlatılamadı.");
        console.log(err);
    });
});
</script>

</body>
